apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin
  namespace: kgateway-base
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: kgateway-base
  labels:
    app.kubernetes.io/name: httpbin
    service: httpbin
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8080
  selector:
    app.kubernetes.io/name: httpbin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: kgateway-base
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin
      version: v1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbin
        version: v1
    spec:
      serviceAccountName: httpbin
      containers:
        - image: docker.io/mccutchen/go-httpbin:v2.6.0
          imagePullPolicy: IfNotPresent
          name: httpbin
          command: [ go-httpbin ]
          args:
            - "-port"
            - "8080"
            - "-max-duration"
            - "600s" # override default 10s
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "200m"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test
  namespace: kgateway-base
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  rules:
    - name: timeout
      matches:
      - path:
          type: PathPrefix
          value: /delay/1
      backendRefs:
        - name: httpbin
          port: 8000
    - name: retry
      matches:
      - path:
          type: PathPrefix
          value: /status
      - path:
          type: PathPrefix
          value: /delay/2
      backendRefs:
        - name: httpbin
          port: 8000
    - name: inherit-gateway
      matches:
      - path:
          type: PathPrefix
          value: /status/517
      backendRefs:
        - name: httpbin
          port: 8000
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: timeout
  namespace: kgateway-base
spec:
  targetRefs:
  - kind: HTTPRoute
    group: gateway.networking.k8s.io
    name: test
    sectionName: timeout
  timeouts:
    request: 1ms
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: retry
  namespace: kgateway-base
spec:
  targetRefs:
  - kind: HTTPRoute
    group: gateway.networking.k8s.io
    name: test
    sectionName: retry
  retry:
    attempts: 2
    perTryTimeout: 1ms
    retryOn:
    - 5xx # required for retries when the upstream does not respond in time
    # statusCodes automatically configures retryOn with retriable-status-codes
    statusCodes:
    - 490
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: retry-listener
  namespace: kgateway-base
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway
    sectionName: http
  retry:
    attempts: 2
    perTryTimeout: 2ms
    statusCodes:
    - 517