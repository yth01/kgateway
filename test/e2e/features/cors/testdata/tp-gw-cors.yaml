apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: gw-cors-policy
  namespace: kgateway-base
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
  cors:
    allowOrigins:
      - https://notexample.com
    allowMethods:
      - GET
      - POST
    allowHeaders:
      - Content-Type
      - Authorization
