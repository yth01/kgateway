apiVersion: v1
kind: Secret
metadata:
  name: server-cert-a
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Secret
metadata:
  name: server-cert-b
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: v1
kind: Secret
metadata:
  name: tenant-a-ca-cert
type: Opaque
data:
  ca.crt: 
---
apiVersion: v1
kind: Secret
metadata:
  name: tenant-b-ca-cert
type: Opaque
data:
  ca.crt: 
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
spec:
  gatewayClassName: kgateway
  tls:
    mode: Terminate
    frontend:
      default:
        validation:
          caCertificateRefs:
          - name: tenant-b-ca-cert
            kind: Secret
            group: ""
  listeners:
  - name: tenant-a-https
    protocol: HTTPS
    port: 8443
    hostname: tenant-a.example.com
    tls:
      mode: Terminate
      certificateRefs:
      - name: server-cert-a
  - name: tenant-b-https
    protocol: HTTPS
    port: 8443
    hostname: tenant-b.example.com
    tls:
      mode: Terminate
      certificateRefs:
      - name: server-cert-b
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: per-listener-mtls
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: example-gateway
    sectionName: tenant-a-https
  default:
    clientCertificateValidation:
      mode: Require
      caCertificateRefs:
      - name: tenant-a-ca-cert
        kind: Secret
        group: ""
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tenant-a-route
spec:
  parentRefs:
  - name: example-gateway
    sectionName: tenant-a-https
  hostnames:
  - tenant-a.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: example-svc
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tenant-b-route
spec:
  parentRefs:
  - name: example-gateway
    sectionName: tenant-b-https
  hostnames:
  - tenant-b.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: example-svc
      port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
spec:
  selector:
    app: example
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
