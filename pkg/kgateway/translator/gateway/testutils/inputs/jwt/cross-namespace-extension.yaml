# This test validates cross-namespace JWT provider configuration where the GatewayExtension resides in another namespace
# than the TrafficPolicy referencing it. It includes:
#
# 1. A HTTPRoute "cross-namespace"
# 2. A TrafficPolicy "cross-namespace-ref-policy" that references a JWT GatewayExtension
# 3. A GatewayExtension in another namespace with a JWT provider
#
# The test verifies that cross-namespace JWT extensionRefs in TrafficPolicy produce the correct Envoy configuration.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
spec:
  gatewayClassName: example-gateway-class
  allowedRoutes:
    namespaces:
      from: All
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-namespace
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - "jwt-auth.example.com"
  rules:
    - backendRefs:
        - name: backend-svc
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
spec:
  selector:
    app: backend-svc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: cross-namespace-ref-policy
spec:
  targetRefs:
    - kind: HTTPRoute
      group: gateway.networking.k8s.io
      name: cross-namespace
  jwtAuth:
    extensionRef:
      name: jwt-ext
      namespace: other-ns
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: jwt-ext
  namespace: other-ns
spec:
  jwt:
    providers:
      - name: gateway-example
        claimsToHeaders:
          - name: gateway
            header: x-gateway
        issuer: https://gateway.example.com
        jwks:
          local:
            inline: |
              -----BEGIN PUBLIC KEY-----
              MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAruK9KacQjDePRyfG7oPI
              aqAIyCeOCBIGB2nBbDLGp1Szdm7rsWcrzGf7Avpa/ijLV9huoNvpdflld4B+SaT7
              m3EDDMDUyA4LayJC5JBI10Qfu3Qn8BEpcdN2uRiycXOzgsoIXneXp9hENlS5Vsr3
              ur5BaBCc+BZZRRaXDTLy6KyD1Pyd6XRsxyZXt/SYOIww0NSt5u0CTyZUGJhQungJ
              pI8Hhrzdf87mLZGZd16dOGObE5LqFwk2prN3D0+owLsA25WJOPZXizxpTB4tPvJu
              YGATajDpzrHf+WXgOgvwyxaHJSN/fE+eFuRT3ooDaAuytsfYotsn4z/ajdEPSwXY
              CwIDAQAB
              -----END PUBLIC KEY-----
