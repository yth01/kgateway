apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: example-gateway
  # these are set for testing purposes, in actual deployment they would be auto-generated by Kubernetes.
  uid: "12345678-abcd-1234-efgh-123456789012"
  generation: 3
spec:
  gatewayClassName: example-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: access-log-otel-identity
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: example-gateway
  default:
    httpSettings:
      accessLog:
      - openTelemetry:
          grpcService:
            backendRef:
              name: opentelemetry-collector
              namespace: default
              port: 4317
            logName: "otel-accesslog-service"
          body: >-
            "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %RESPONSE_CODE%"
      tracing:
        provider:
          openTelemetry:
            grpcService:
              backendRef:
                name: opentelemetry-collector
                namespace: default
                port: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-collector
spec:
  selector:
    test: test
  ports:
  - protocol: HTTP
    port: 4317
